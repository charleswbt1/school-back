<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Credencial IU Conecta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {

            background: #f3f5f9;
            display: flex;
            justify-content: center;
            padding: 40px;

        }

        .container {

            display: flex;
            gap: 50px;
            flex-wrap: wrap;

        }

        /*========================*/

        .credential {

            position: relative;
            width: 200px;
            height: 312px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);

        }

        /*========================*/

        .left-decoration {

            position: absolute;
            top: 0;
            left: 0;
            width: 70px;
            height: 100%;
            background: #173b73;
            border-radius: 10px 40px 40px 10px;

        }

        /*========================*/
        .header {

            position: absolute;
            top: 12px;
            left: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            z-index: 5;

        }

        .logo {
            width: 50px;
            height: 38px;
            object-fit: cover;
            border-radius: 10px;
            /* Esquinas redondeadas */
            background: #fff;
            padding: 4px;
        }

        .school {

            text-align: right;
            color: #173b73;

        }

        .school h3 {

            font-size: 8px;
            letter-spacing: 1.5px;
            font-weight: bold;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;

        }

        .school h1 {

            font-size: 18px;
            margin-top: 2px;
            font-weight: 800;

            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;

        }

        /*========================*/

        .photo {

            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
        }

        .photo img {

            width: 78px;
            height: 78px;
            border-radius: 50%;
            border: 4px solid #173b73;

        }

        /*========================*/

        .student {

            position: absolute;
            top: 190px;
            width: 100%;
            text-align: center;
            padding: 0 10px;

        }

        .student h2 {

            color: #06023f;
            font-size: 16px;
            line-height: 1.2;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;

        }

        .student h4 {

            color: #242222;
            font-size: 10px;
            margin-top: 5px;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;

        }

        /*========================*/
        /* REVERSO */
        /*========================*/

        .back {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 35px;
        }

        .header-back {
            text-align: center;

        }

        .header-back h2 {
            color: #173b73;
            font-size: 15px;
            margin-bottom: 18px;
            line-height: 1.15;

        }

        .info {
            margin-top: 10px;
        }

        .info p {
            font-size: 11px;
            margin: 8px 0;
        }

        .qr {
            width: 70px;
            margin: 15px auto 0;
            display: none;
        }

        .footer {

            position: absolute;
            bottom: 14px;
            width: 100%;
            text-align: center;
            color: #173b73;
            font-weight: bold;
            font-size: 10px;
            text-shadow:
                -1px -1px 0 #fff,
                1px -1px 0 #fff,
                -1px 1px 0 #fff,
                1px 1px 0 #fff;

        }

        .bottom-bar {

            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: #173b73;
            border-top: 4px solid #f7b13c;

        }
    </style>
</head>

<body>

    <div class="container">

        <!-- FRENTE -->
        <div class="credential">

            <div class="left-decoration"></div>

            <div class="header">


                <img src="logo.jpg" alt="Instituto Universitario Conecta" class="logo">


                <div class="school">

                    <h3>INSTITUTO UNIVERSITARIO</h3>

                    <h1>CONECTA</h1>

                </div>

            </div>

            <div class="photo">

                <img src="https://storage.googleapis.com/school-source/web/perfil.jpg">

            </div>

            <div class="student">

                <h2>JUAN PÉREZ GARCÍA</h2>

                <h4>LICENCIATURA EN DERECHO</h4>

            </div>

            <div class="footer">

                www.iuconecta.com

            </div>

            <div class="bottom-bar"></div>

        </div>


        <!-- REVERSO -->
        <div class="credential back">

            <div class="header-back">

                <h2>
                    INSTITUTO<br>
                    UNIVERSITARIO<br>
                    CONECTA
                </h2>

            </div>

            <div class="info">

                <p><strong>Matrícula:</strong> 202500001</p>

                <p><strong>CURP:</strong> PEGJ010101HHGABC01</p>

                <p><strong>Vigencia:</strong> Dic. 2026</p>

            </div>

            <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=202500001">

        </div>

    </div>

    </div>

</body>

</html>
